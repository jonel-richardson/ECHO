<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ECHO — Postpartum Screening</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-gray-50 min-h-screen">

    <header class="bg-white border-b border-gray-200 px-6 py-4">
        <div class="max-w-2xl mx-auto flex items-center gap-3">
            <div>
                <h1 class="text-xl font-bold text-gray-900">ECHO</h1>
                <p class="text-xs text-gray-500">Early Care Handoff Observer — Provider Tool</p>
            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-6 py-8">

        <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6">
            <h2 class="text-base font-semibold text-gray-800 mb-1">Patient Screening Parameters</h2>
            <p class="text-sm text-gray-500 mb-6">Enter patient details to generate a postpartum screening checklist. No name or MRN is required or stored.</p>

            <div id="error-msg" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded text-sm text-red-700"></div>

            <form id="echo-form" novalidate class="space-y-5">

                <!-- Age + Weeks postpartum -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="age" class="block text-sm font-medium text-gray-700 mb-1">Patient Age <span class="text-red-500">*</span></label>
                        <input id="age" name="age" type="number" min="1" max="99"
                            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                            placeholder="e.g. 28" required />
                    </div>
                    <div>
                        <label for="weeks_postpartum" class="block text-sm font-medium text-gray-700 mb-1">Weeks Postpartum <span class="text-red-500">*</span></label>
                        <input id="weeks_postpartum" name="weeks_postpartum" type="number" min="0" max="52"
                            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                            placeholder="e.g. 6" required />
                    </div>
                </div>

                <!-- Race / ethnicity -->
                <div>
                    <label for="race_ethnicity" class="block text-sm font-medium text-gray-700 mb-1">Race / Ethnicity <span class="text-red-500">*</span></label>
                    <select id="race_ethnicity" name="race_ethnicity"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                        <option value="" disabled selected>Select race / ethnicity</option>
                        <option value="Black or African American">Black or African American</option>
                        <option value="White">White</option>
                        <option value="Hispanic or Latino">Hispanic or Latino</option>
                        <option value="Asian">Asian</option>
                    </select>
                </div>

                <!-- Payer + State -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="payer" class="block text-sm font-medium text-gray-700 mb-1">Payer <span class="text-red-500">*</span></label>
                        <select id="payer" name="payer"
                            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                            <option value="" disabled selected>Select payer</option>
                            <option value="Medicaid">Medicaid</option>
                            <option value="Private">Private</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div>
                        <label for="state" class="block text-sm font-medium text-gray-700 mb-1">State <span class="text-red-500">*</span></label>
                        <select id="state" name="state"
                            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                            <option value="" disabled selected>Select state...</option>
                            <option value="NY">New York (NY)</option>
                            <option value="TX">Texas (TX)</option>
                        </select>
                    </div>
                </div>

                <!-- Hospital name -->
                <div>
                    <label for="hospital_name" class="block text-sm font-medium text-gray-700 mb-1">Hospital Name <span class="text-red-500">*</span></label>
                    <select id="hospital_name" name="hospital_name" disabled
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:bg-gray-100 disabled:text-gray-400" required>
                        <option value="" disabled selected>Select state first...</option>
                    </select>
                </div>

                <!-- Primary language -->
                <div>
                    <label for="primary_language" class="block text-sm font-medium text-gray-700 mb-1">Primary Language <span class="text-red-500">*</span></label>
                    <select id="primary_language" name="primary_language"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                        <option value="" disabled selected>Select language...</option>
                        <option value="English">English</option>
                        <option value="Spanish">Spanish</option>
                    </select>
                </div>

                <!-- Complications (multi-select checkboxes) -->
                <div>
                    <p class="block text-sm font-medium text-gray-700 mb-2">Complications Flagged <span class="text-gray-400 font-normal">(select all that apply)</span></p>
                    <div class="grid grid-cols-2 gap-2">
                        <label class="flex items-center gap-2 text-sm text-gray-700">
                            <input type="checkbox" name="complications_flagged" value="hypertension" class="rounded border-gray-300" />
                            Hypertension
                        </label>
                        <label class="flex items-center gap-2 text-sm text-gray-700">
                            <input type="checkbox" name="complications_flagged" value="preeclampsia" class="rounded border-gray-300" />
                            Preeclampsia
                        </label>
                        <label class="flex items-center gap-2 text-sm text-gray-700">
                            <input type="checkbox" name="complications_flagged" value="hypertensive disorder" class="rounded border-gray-300" />
                            Hypertensive Disorder
                        </label>
                        <label class="flex items-center gap-2 text-sm text-gray-700">
                            <input type="checkbox" name="complications_flagged" value="mental health" class="rounded border-gray-300" />
                            Mental Health
                        </label>
                        <label class="flex items-center gap-2 text-sm text-gray-700">
                            <input type="checkbox" name="complications_flagged" value="depression" class="rounded border-gray-300" />
                            Depression
                        </label>
                        <label class="flex items-center gap-2 text-sm text-gray-700">
                            <input type="checkbox" name="complications_flagged" value="anxiety" class="rounded border-gray-300" />
                            Anxiety
                        </label>
                        <label class="flex items-center gap-2 text-sm text-gray-700">
                            <input type="checkbox" name="complications_flagged" value="substance use" class="rounded border-gray-300" />
                            Substance Use
                        </label>
                        <label class="flex items-center gap-2 text-sm text-gray-700">
                            <input type="checkbox" name="complications_flagged" value="OUD" class="rounded border-gray-300" />
                            OUD
                        </label>
                    </div>
                </div>

                <button id="submit-btn" type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 px-4 rounded-lg text-sm transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                    Generate Checklist
                </button>

            </form>
        </div>

    </main>

    <script src="app.js"></script>
</body>
</html>
