<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ECHO — Checklist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-gray-50 min-h-screen">

    <header class="bg-white border-b border-gray-200 px-6 py-4">
        <div class="max-w-3xl mx-auto flex items-center justify-between">
            <div>
                <h1 class="text-xl font-bold text-gray-900">ECHO</h1>
                <p class="text-xs text-gray-500">Early Care Handoff Observer — Provider Tool</p>
            </div>
            <a href="index.html" class="text-sm text-blue-600 hover:underline">← New Patient</a>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-6 py-8 space-y-6">

        <!-- 1. Patient context header -->
        <div id="patient-header" class="bg-white rounded-xl border border-gray-200 shadow-sm p-5"></div>

        <!-- 2. Communication framing -->
        <div class="bg-blue-50 border border-blue-200 rounded-xl p-5">
            <h2 class="text-sm font-semibold text-blue-800 uppercase tracking-wide mb-2">Clinical Context</h2>
            <div id="framing-block" class="text-sm"></div>
        </div>

        <!-- 3. Prioritized checklist items (warning signs + SDOH + findings) -->
        <div>
            <h2 class="text-sm font-semibold text-gray-700 uppercase tracking-wide mb-3">Screening Checklist — Ordered by Priority</h2>
            <div id="checklist-items" class="space-y-3"></div>
        </div>

        <!-- 4. Hospital commitment status -->
        <div id="hospital-status" class="bg-white rounded-xl border border-gray-200 shadow-sm p-5 text-sm"></div>

        <!-- 5. Conflict flags -->
        <div id="conflict-flags" class="bg-white rounded-xl border border-purple-200 shadow-sm p-5 text-sm hidden"></div>

        <!-- 6. Data confidence summary -->
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5">
            <h3 class="text-sm font-semibold text-gray-700 mb-1">Data Confidence Summary</h3>
            <p id="confidence-summary" class="text-sm text-gray-600"></p>
        </div>

        <!-- 7. Clinical disclaimer -->
        <div class="bg-gray-100 rounded-xl border border-gray-300 p-5">
            <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Clinical Disclaimer</h3>
            <p id="clinical-disclaimer" class="text-xs text-gray-600 leading-relaxed"></p>
        </div>

    </main>

    <script src="app.js"></script>
    <script>loadChecklist();</script>
</body>
</html>
